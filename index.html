<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNR VAULT | 500+ Premium Cinema Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-dark: #050505;
            --bg-card: #111111;
            --text-main: #FFFFFF;
            --text-dim: #888888;
            --tg-blue: #0088cc;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        h1, h2, h3, .btn-dl, .quality-label, .imdb-rating, .rank-num, .status-date, .price-badge, .btn-modal-admin { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        /* Navbar */
        nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(25px); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .site-logo { height: 45px; filter: drop-shadow(0 0 10px var(--gold-glow)); }
        .status-date { font-size: 0.65rem; color: var(--gold); display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .status-dot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Hero */
        .hero { height: 40vh; background: linear-gradient(to top, var(--bg-dark), transparent), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; margin-top: 60px; }
        .hero h1 { font-size: clamp(3rem, 10vw, 5.5rem); }
        .hero h1 span { color: var(--gold); background: linear-gradient(to right, #bf953f, #fcf6ba, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Top 10 Trending */
        .trending-section { padding: 3rem 0 1rem 5%; }
        .trending-container { display: flex; overflow-x: auto; gap: 65px; padding: 40px 20px; scrollbar-width: none; }
        .trending-card { position: relative; min-width: 200px; height: 300px; flex-shrink: 0; transition: var(--transition); cursor: pointer; }
        .trending-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .rank-num { position: absolute; bottom: -25px; left: -50px; font-size: 11rem; font-weight: 900; color: var(--bg-dark); -webkit-text-stroke: 2px var(--gold); z-index: 1; }
        .trending-card:hover { transform: scale(1.06); }

        /* Search & Grid */
        .controls { padding: 2rem 5%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .search-box { background: #1a1a1a; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 50px; display: flex; width: 100%; max-width: 550px; }
        .search-box input { background: transparent; border: none; padding: 18px 25px; color: white; width: 100%; outline: none; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 0 5% 5rem; }
        .movie-card { background: var(--bg-card); border-radius: 15px; overflow: hidden; opacity: 0; transform: translateY(20px); transition: 0.6s; }
        .movie-card.reveal { opacity: 1; transform: translateY(0); }
        .poster-box { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .movie-card:hover .poster-box img { transform: scale(1.1); }
        .imdb-rating { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); color: var(--gold); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--gold); font-weight: 900; }
        .quality-label { position: absolute; top: 12px; left: 0; background: var(--gold); color: #000; padding: 4px 10px; font-size: 0.7rem; font-weight: 700; }
        .btn-dl { display: block; text-align: center; background: #1a1a1a; color: var(--gold); padding: 10px; border-radius: 8px; text-decoration: none; font-weight: 700; border: 1px solid var(--gold); margin: 1rem; transition: 0.3s; }
        .btn-dl:hover { background: var(--gold); color: #000; }

        /* VIP Popup */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: #0a0a0a; width: 90%; max-width: 420px; padding: 40px 30px; border-radius: 24px; border: 1px solid var(--gold); text-align: center; position: relative; }
        .price-badge { background: var(--gold); color: #000; padding: 8px 20px; border-radius: 8px; font-weight: 900; font-size: 1.2rem; margin: 15px 0; display: inline-block; }
        
        /* Floating Elements */
        .user-count-float { position: fixed; top: 90px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 40px; font-size: 0.7rem; font-weight: 700; border: 1px solid var(--gold); z-index: 900; color: #fff; display: flex; align-items: center; gap: 8px; }
        .fab-request { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 2000; text-decoration: none; box-shadow: 0 10px 30px var(--gold-glow); }

        footer { padding: 4rem 5%; text-align: center; border-top: 1px solid rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body>

    <div id="vipModal" class="modal-overlay">
        <div class="modal-content">
            <button style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer;" onclick="closeVIP()">&times;</button>
            <i class="fas fa-crown" style="font-size: 3rem; color: var(--gold); margin-bottom: 10px;"></i>
            <h2>LIFETIME VIP ACCESS</h2>
            <div class="price-badge">ONLY $1.99 / ₹149</div>
            <a href="https://t.me/NewRocker_Admin" style="display:block; background:#fff; color:#000; padding:15px; border-radius:12px; text-decoration:none; font-weight:700;">CONTACT ADMIN TO JOIN</a>
        </div>
    </div>

    <nav>
        <div class="logo-group">
            <img src="KNR LOGO.jpg" alt="KNR VAULT" class="site-logo">
            <div class="status-date"><span class="status-dot"></span> LIVE • <span id="currentDate"></span></div>
        </div>
        <a href="https://t.me/KNR_MOVIEES" style="background:var(--tg-blue); color:#fff; padding:12px 25px; border-radius:50px; text-decoration:none; font-weight:700;">JOIN CHANNEL</a>
    </nav>

    <div id="vaultMain">
        <a href="https://t.me/NewRocker_Admin" class="fab-request"><i class="fas fa-plus"></i></a>
        <header class="hero"><h1>KNR <span>VAULT</span></h1></header>

        <section class="trending-section">
            <h2 style="padding-left:20px; border-left:4px solid var(--gold);">Trending Top 10</h2>
            <div class="trending-container" id="trendingList"></div>
        </section>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="movieSearch" placeholder="Search 500+ Movies..." onkeyup="filterBySearch()">
                <div style="padding:18px; color:var(--gold);"><i class="fas fa-search"></i></div>
            </div>
        </div>

        <main class="container">
            <div id="loader" style="text-align:center; padding:50px; color:var(--gold);">SYNCING LARGE DATABASE...</div>
            <div class="movie-grid" id="movieDisplay"></div>
        </main>

        <footer><p>© 2026 KNR VAULT | MEMBERSHIP VIA @NEWROCKER_ADMIN</p></footer>
    </div>

    <script>
        const API_KEY = '38f9f86a';
        const TG_LINK = "https://t.me/KNR_MOVIEES";
        
        // ADD YOUR 500+ IMDb IDs HERE
        const imdbIDs = [
            'tt15239678','tt15327088','tt11655202','tt0468569','tt1877830','tt0816692','tt10874610','tt16419074',
            'tt1375666','tt16277242','tt1517268','tt29623480','tt0111161','tt0110912','tt0137523','tt0109830',
            'tt0068646','tt0167260','tt0120737','tt0172495','tt0050083','tt0080684','tt0076759','tt0088763',
            'tt0082971','tt0076190','tt0075148','tt0071562','tt0066921','tt0060196','tt0059578','tt0057012'
            // Add more IDs as needed to reach 500
        ];

        let database = [];

        async function initVault() {
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
            
            // To handle 500 movies efficiently, we load them in chunks
            for(let i=0; i<imdbIDs.length; i++) {
                fetch(`https://www.omdbapi.com/?i=${imdbIDs[i]}&apikey=${API_KEY}`)
                .then(res => res.json())
                .then(m => {
                    if(m.Response === "True") {
                        database.push(m);
                        if(database.length <= 10) renderTrending();
                        updateGrid();
                    }
                });
            }
            document.getElementById('loader').style.display = 'none';
            initCounters();
            setTimeout(() => { document.getElementById('vipModal').style.display = 'flex'; }, 5000);
        }

        function renderTrending() {
            document.getElementById('trendingList').innerHTML = database.slice(0, 10).map((m, i) => `
                <div class="trending-card" onclick="window.location.href='${TG_LINK}'">
                    <div class="rank-num">${i + 1}</div>
                    <img src="${m.Poster}">
                </div>`).join('');
        }

        function updateGrid() {
            const grid = document.getElementById('movieDisplay');
            grid.innerHTML = database.map(m => `
                <div class="movie-card reveal">
                    <div class="poster-box">
                        <div class="quality-label">4K VIP</div>
                        <div class="imdb-rating">${m.imdbRating}</div>
                        <img src="${m.Poster}" loading="lazy">
                    </div>
                    <div class="movie-info">
                        <h3 style="font-size:0.9rem;">${m.Title}</h3>
                        <a href="${TG_LINK}" class="btn-dl">DOWNLOAD</a>
                    </div>
                </div>`).join('');
        }

        function filterBySearch() {
            const val = document.getElementById('movieSearch').value.toLowerCase();
            const filtered = database.filter(m => m.Title.toLowerCase().includes(val));
            document.getElementById('movieDisplay').innerHTML = filtered.map(m => `
                <div class="movie-card reveal">
                    <div class="poster-box">
                        <div class="quality-label">4K VIP</div>
                        <div class="imdb-rating">${m.imdbRating}</div>
                        <img src="${m.Poster}" loading="lazy">
                    </div>
                    <div class="movie-info"><h3>${m.Title}</h3><a href="${TG_LINK}" class="btn-dl">DOWNLOAD</a></div>
                </div>`).join('');
        }

        function initCounters() {
            const div = document.createElement('div'); div.className = 'user-count-float';
            div.innerHTML = `<span class="status-dot"></span> <span id="uv">1,240</span> BROWSING`;
            document.body.appendChild(div);
            setInterval(() => { document.getElementById('uv').innerText = (1100 + Math.floor(Math.random()*400)).toLocaleString(); }, 5000);
        }

        function closeVIP() { document.getElementById('vipModal').style.display = 'none'; }
        
        initVault();
    </script>
</body>
</html>
